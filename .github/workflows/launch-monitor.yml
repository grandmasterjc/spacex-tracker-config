name: Launch Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (log only, no notifications or state commits)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: launch-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run launch monitor
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/launch_monitor.py --dry-run
          else
            python scripts/launch_monitor.py
          fi

      - name: Commit updated state
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/launch_state.json
          git diff --cached --quiet || git commit -m "chore: update launch state [skip ci]"
          git push
